<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Ludo Game</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        <h1>Ludo Web App</h1>
        
        <div id="board">
            <div class="home red-home" id="red-base"></div>
            <div class="home green-home" id="green-base"></div>
            <div class="home blue-home" id="blue-base"></div>
            <div class="home yellow-home" id="yellow-base"></div>
            
            </div>

        <div class="ui-panel">
            <div id="dice-display">🎲</div>
            <button id="roll-btn">ROLL DICE</button>
            <p id="status">Click to Start!</p>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
