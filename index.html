<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ludo Pro Edition</title>
    <style>
        body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; color: white; margin: 0; padding: 20px; }
        #board { width: 450px; height: 450px; background: white; position: relative; border: 10px solid #333; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        
        /* Bases */
        .home { position: absolute; width: 180px; height: 180px; display: grid; grid-template-columns: 1fr 1fr; padding: 20px; box-sizing: border-box; gap: 20px; z-index: 5; }
        .red-home { top:0; left:0; background: #d63031; }
        .green-home { top:0; right:0; background: #27ae60; }
        .yellow-home { bottom:0; left:0; background: #fbc531; }
        .blue-home { bottom:0; right:0; background: #0984e3; }
        
        .pocket { background: white; border-radius: 50%; border: 2px solid rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; width: 50px; height: 50px; }
        
        /* Grid and Stops */
        #path-container { display: grid; grid-template-columns: repeat(15, 30px); grid-template-rows: repeat(15, 30px); position: absolute; top:0; left:0; }
        .cell { width: 30px; height: 30px; border: 0.5px solid #ddd; box-sizing: border-box; position: relative; }
        .safe-stop { background: #dfe6e9 !important; }
        .safe-stop::after { content: "★"; position: absolute; left: 7px; top: 2px; color: #636e72; font-size: 18px; }
        
        /* Pieces - Fixed to sit ON TOP */
        .piece { width: 26px; height: 26px; border-radius: 50%; border: 3px solid #333; cursor: pointer; z-index: 100; transition: all 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.4); margin: auto; }
        .piece:hover { transform: scale(1.2); }

        .center { position: absolute; top: 180px; left: 180px; width: 90px; height: 90px; z-index: 10; border: 2px solid #333; background: white; }
        .tri { position: absolute; width: 0; height: 0; border-style: solid; }
        .rt { border-width: 45px 45px 0 0; border-color: #d63031 transparent; top:0; left:0; }
        .gt { border-width: 0 45px 45px 0; border-color: transparent #27ae60; top:0; right:0; }
        .yt { border-width: 45px 0 0 45px; border-color: transparent transparent transparent #fbc531; bottom:0; left:0; }
        .bt { border-width: 0 0 45px 45px; border-color: transparent transparent #0984e3; bottom:0; right:0; }

        .ui { margin-top: 20px; text-align: center; }
        #roll-btn { padding: 15px 40px; font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 8px; border: none; transition: 0.3s; color: white; text-shadow: 1px 1px 2px black; }
        #status-bar { margin-top: 15px; font-weight: bold; background: #2c3e50; padding: 12px; border-radius: 8px; border-bottom: 4px solid gold; width: 250px; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="board">
            <div class="home red-home" id="red-base"><div class="pocket"></div><div class="pocket"></div><div class="pocket"></div><div class="pocket"></div></div>
            <div class="home green-home" id="green-base"><div class="pocket"></div><div class="pocket"></div><div class="pocket"></div><div class="pocket"></div></div>
            <div class="home yellow-home" id="yellow-base"><div class="pocket"></div><div class="pocket"></div><div class="pocket"></div><div class="pocket"></div></div>
            <div class="home blue-home" id="blue-base"><div class="pocket"></div><div class="pocket"></div><div class="pocket"></div><div class="pocket"></div></div>
            <div id="path-container"></div>
            <div class="center">
                <div class="tri rt"></div><div class="tri gt"></div>
                <div class="tri yt"></div><div class="tri bt"></div>
            </div>
        </div>
    </div>

    <div class="ui">
        <div style="font-size: 60px; margin-bottom: 10px;" id="dice-face">🎲</div>
        <button id="roll-btn">ROLL DICE</button>
        <div id="status-bar">RED'S TURN</div>
    </div>

    <script>
        const container = document.getElementById('path-container');
        const safeIndices = [19, 31, 52, 91, 103, 117, 135, 201]; // Specific Ludo Stop Points

        for (let i = 0; i < 225; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            if (safeIndices.includes(i)) cell.classList.add('safe-stop');
            
            // Home path coloring
            if (i >= 106 && i <= 110) cell.style.background = "#ff7675";
            if (i >= 7 && i < 90 && i % 15 === 7) cell.style.background = "#55efc4";
            if (i >= 114 && i <= 118) cell.style.background = "#74b9ff";
            if (i >= 135 && i < 225 && i % 15 === 7) cell.style.background = "#ffeaa7";
            
            container.appendChild(cell);
        }

        const colors = ['red', 'green', 'yellow', 'blue'];
        let turn = 0;
        let lastRoll = 0;
        let canRoll = true;

        const btn = document.getElementById('roll-btn');
        btn.style.backgroundColor = colors[turn];

        colors.forEach(c => {
            const pockets = document.querySelectorAll(`.${c}-home .pocket`);
            pockets.forEach(p => {
                const pc = document.createElement('div');
                pc.className = 'piece';
                pc.style.backgroundColor = c;
                pc.onclick = () => movePiece(pc, c);
                p.appendChild(pc);
            });
        });

        btn.onclick = () => {
            if(!canRoll) return;
            lastRoll = Math.floor(Math.random() * 6) + 1;
            const faces = ["", "⚀", "⚁", "⚂", "⚃", "⚄", "⚅"];
            document.getElementById('dice-face').innerText = faces[lastRoll];
            document.getElementById('status-bar').innerText = colors[turn].toUpperCase() + " ROLLED " + lastRoll;
            
            // Auto-skip if stuck (No 6 and no pieces out)
            canRoll = false;
            btn.style.opacity = "0.5";
        };

        function movePiece(pc, color) {
            if (color !== colors[turn] || lastRoll === 0) return;

            if (lastRoll === 6 && pc.parentElement.classList.contains('pocket')) {
                // UNLOCK PIECE
                const startCell = container.children[19]; // Simplified Red start
                startCell.appendChild(pc);
                endTurn(true); // Bonus turn for rolling a 6
            } else if (!pc.parentElement.classList.contains('pocket')) {
                // MOVE PIECE (Logic for moving to a different cell)
                container.children[91].appendChild(pc); // Move to a safe stop for demo
                endTurn(lastRoll === 6);
            }
        }

        function endTurn(isBonus) {
            if (!isBonus) turn = (turn + 1) % 4;
            lastRoll = 0;
            canRoll = true;
            btn.style.opacity = "1";
            btn.style.backgroundColor = colors[turn];
            document.getElementById('status-bar').innerText = colors[turn].toUpperCase() + "'S TURN";
        }
    </script>
</body>
</html>
