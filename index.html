<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ludo Pro - Accurate Star Positions</title>
    <style>
        body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; color: white; margin: 0; padding: 20px; }
        #board { width: 450px; height: 450px; background: white; position: relative; border: 10px solid #222; }
        
        /* Bases - z-index 5 */
        .home { position: absolute; width: 180px; height: 180px; display: grid; grid-template-columns: 1fr 1fr; padding: 20px; box-sizing: border-box; gap: 20px; z-index: 5; }
        .red-home { top:0; left:0; background: #eb4d4b; }
        .green-home { top:0; right:0; background: #6ab04c; }
        .yellow-home { bottom:0; left:0; background: #f9ca24; }
        .blue-home { bottom:0; right:0; background: #0984e3; }
        
        .pocket { background: white; border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; }
        
        /* Grid - z-index 1 */
        #path-container { display: grid; grid-template-columns: repeat(15, 30px); grid-template-rows: repeat(15, 30px); position: absolute; top:0; left:0; z-index: 1; }
        .cell { width: 30px; height: 30px; border: 0.1px solid #ddd; box-sizing: border-box; position: relative; display: flex; align-items: center; justify-content: center; }
        
        /* THE STARS - Manually Adjusted for 15x15 Logic */
        .safe-stop { background: #f1f2f6 !important; }
        .safe-stop::after { content: "☆"; position: absolute; color: #7f8c8d; font-size: 24px; font-weight: bold; z-index: 2; }
        
        /* PIECE FIX - z-index 999 ensures they never hide under bases */
        .piece { width: 24px; height: 24px; border-radius: 50%; border: 2px solid #fff; cursor: pointer; z-index: 999 !important; position: absolute; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }

        .center { position: absolute; top: 180px; left: 180px; width: 90px; height: 90px; z-index: 10; background: white; border: 2px solid #333; overflow: hidden; }
        .tri { position: absolute; width: 0; height: 0; border-style: solid; }
        .tri-red { border-width: 45px 45px 0 0; border-color: #eb4d4b transparent; top:0; left:0; }
        .tri-green { border-width: 0 45px 45px 0; border-color: transparent #6ab04c; top:0; right:0; }
        .tri-yellow { border-width: 45px 0 0 45px; border-color: transparent transparent transparent #f9ca24; bottom:0; left:0; }
        .tri-blue { border-width: 0 0 45px 45px; border-color: transparent transparent #0984e3; bottom:0; right:0; }

        .ui { margin-top: 20px; text-align: center; }
        #roll-btn { padding: 12px 30px; font-size: 18px; cursor: pointer; border-radius: 20px; border: none; color: white; background: #eb4d4b; transition: 0.2s; }
    </style>
</head>
<body>
    <div id="board">
        <div class="home red-home"><div class="pocket"></div><div class="pocket"></div><div class="pocket"></div><div class="pocket"></div></div>
        <div class="home green-home"><div class="pocket"></div><div class="pocket"></div><div class="pocket"></div><div class="pocket"></div></div>
        <div class="home yellow-home"><div class="pocket"></div><div class="pocket"></div><div class="pocket"></div><div class="pocket"></div></div>
        <div class="home blue-home"><div class="pocket"></div><div class="pocket"></div><div class="pocket"></div><div class="pocket"></div></div>
        <div id="path-container"></div>
        <div class="center">
            <div class="tri tri-red"></div><div class="tri tri-green"></div>
            <div class="tri tri-yellow"></div><div class="tri tri-blue"></div>
        </div>
    </div>
    <div class="ui">
        <div style="font-size: 50px;" id="dice-face">🎲</div>
        <button id="roll-btn">ROLL DICE</button>
        <div id="status-bar" style="margin-top:10px; font-weight: bold;">RED'S TURN</div>
    </div>

    <script>
        const container = document.getElementById('path-container');
        
        // UPDATED INDICES FOR THE 15x15 GRID
        // These match the entrance and 8th block safety zones exactly.
        const safeIndices = [91, 19, 133, 205, 121, 52, 103, 172]; 
        const startPositions = { 'red': 91, 'green': 19, 'yellow': 133, 'blue': 205 };

        for (let i = 0; i < 225; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            if (safeIndices.includes(i)) cell.classList.add('safe-stop');
            
            // Re-painting the home paths
            if (i >= 106 && i <= 110) cell.style.background = "#ffcccc";
            if (i >= 7 && i < 90 && i % 15 === 7) cell.style.background = "#ccffcc";
            if (i >= 114 && i <= 118) cell.style.background = "#cceeff";
            if (i >= 135 && i < 225 && i % 15 === 7) cell.style.background = "#ffffcc";
            
            container.appendChild(cell);
        }

        const colors = ['red', 'green', 'yellow', 'blue'];
        let turn = 0, lastRoll = 0, canRoll = true;

        colors.forEach(c => {
            const pockets = document.querySelectorAll(`.${c}-home .pocket`);
            pockets.forEach(p => {
                const pc = document.createElement('div');
                pc.className = 'piece';
                pc.style.backgroundColor = (c === 'red') ? '#eb4d4b' : (c === 'green') ? '#6ab04c' : (c === 'yellow') ? '#f9ca24' : '#0984e3';
                pc.dataset.color = c;
                pc.onclick = () => movePiece(pc);
                p.appendChild(pc);
            });
        });

        document.getElementById('roll-btn').onclick = function() {
            if(!canRoll) return;
            lastRoll = Math.floor(Math.random() * 6) + 1;
            document.getElementById('dice-face').innerText = ["", "⚀", "⚁", "⚂", "⚃", "⚄", "⚅"][lastRoll];
            
            let piecesOut = document.querySelectorAll(`.piece[data-color="${colors[turn]}"]`).length;
            let piecesInPlay = [...document.querySelectorAll('.piece')].filter(p => p.dataset.color === colors[turn] && !p.parentElement.classList.contains('pocket')).length;

            if (lastRoll < 6 && piecesInPlay === 0) {
                canRoll = false;
                setTimeout(nextTurn, 800);
            } else {
                canRoll = false;
                this.style.opacity = "0.5";
            }
        };

        function movePiece(pc) {
            if (pc.dataset.color !== colors[turn] || lastRoll === 0) return;

            if (lastRoll === 6 && pc.parentElement.classList.contains('pocket')) {
                container.children[startPositions[colors[turn]]].appendChild(pc);
                nextTurn(); 
            } else if (!pc.parentElement.classList.contains('pocket')) {
                let cur = Array.from(container.children).indexOf(pc.parentElement);
                container.children[(cur + lastRoll) % 225].appendChild(pc);
                nextTurn();
            }
        }

        function nextTurn() {
            turn = (turn + 1) % 4; 
            lastRoll = 0; canRoll = true;
            document.getElementById('roll-btn').style.opacity = "1";
            document.getElementById('status-bar').innerText = colors[turn].toUpperCase() + "'S TURN";
            document.getElementById('roll-btn').style.backgroundColor = (colors[turn] === 'red') ? '#eb4d4b' : (colors[turn] === 'green') ? '#6ab04c' : (colors[turn] === 'yellow') ? '#f9ca24' : '#0984e3';
        }
    </script>
</body>
</html>
