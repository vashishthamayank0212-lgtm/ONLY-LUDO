<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ludo Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="board">
        <div class="home red-home" id="red-base"></div>
        <div class="home green-home" id="green-base"></div>
        <div class="home yellow-home" id="yellow-base"></div>
        <div class="home blue-home" id="blue-base"></div>
        
        <div id="cells-container"></div>

        <div class="center">
            <div class="tri red-t"></div><div class="tri green-t"></div>
            <div class="tri blue-t"></div><div class="tri yellow-t"></div>
        </div>
    </div>

    <div class="controls">
        <div id="dice">🎲</div>
        <button id="roll-btn">ROLL DICE</button>
        <p id="status">RED'S TURN</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
