<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ludo Pro Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="board">
            <div class="home red-home" id="red-base">
                <div class="pocket"></div><div class="pocket"></div>
                <div class="pocket"></div><div class="pocket"></div>
            </div>
            <div class="home green-home" id="green-base">
                <div class="pocket"></div><div class="pocket"></div>
                <div class="pocket"></div><div class="pocket"></div>
            </div>
            <div class="home yellow-home" id="yellow-base">
                <div class="pocket"></div><div class="pocket"></div>
                <div class="pocket"></div><div class="pocket"></div>
            </div>
            <div class="home blue-home" id="blue-base">
                <div class="pocket"></div><div class="pocket"></div>
                <div class="pocket"></div><div class="pocket"></div>
            </div>
            
            <div id="path-container"></div>

            <div class="center-main">
                <div class="t-red"></div><div class="t-green"></div>
                <div class="t-blue"></div><div class="t-yellow"></div>
            </div>
        </div>

        <div class="ui">
            <div id="dice-display">🎲</div>
            <button id="roll-btn">ROLL DICE</button>
            <p id="status">Ready Player 1</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
